<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Select Auto | MoveMaster</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500&display=swap');

body {
  font-family: 'Baloo 2', cursive;
  background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)),
              url("images/map.jpg") no-repeat center center;
  background-size: cover;
  margin:0;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.modal {
  background:white;
  border-radius:20px;
  padding:30px;
  width:800px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.3);
  position:relative;
}

.modal h2 {
  color:#0aa2e6;
  margin-bottom:10px;
  font-size:24px;
}

.route {
  color:#555;
  margin-bottom:20px;
  font-size:16px;
}

.fare-rate {
  font-weight:bold;
  text-align:center;
  margin-bottom:20px;
}

.autos {
  display:flex;
  justify-content:space-between;
  gap:15px;
}

.auto-card {
  border:2px solid #eee;
  border-radius:15px;
  padding:15px;
  flex:1;
  text-align:center;
  transition:0.3s;
  cursor:pointer;
  background:white;
  position:relative;
}
.auto-card.selected {
  border-color:#0aa2e6;
  box-shadow:0 8px 25px rgba(0,162,230,0.2);
}

.auto-card img {
  width:90px;
  margin-bottom:10px;
}

.auto-card h4 {
  color:#0aa2e6;
  margin-bottom:5px;
}

.price { font-weight:bold; margin-bottom:5px; color:#0aa2e6; }
.eta { font-size:13px; color:#666; margin-bottom:10px; }

button.select-btn {
  background:#0aa2e6;
  border:none;
  color:white;
  padding:8px 15px;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
  transition:0.3s;
}
button.select-btn:hover { background:#088ac7; }

.toast {
  position:absolute;
  top:-70px;
  left:50%;
  transform:translateX(-50%);
  background:#0aa2e6;
  color:white;
  padding:12px 20px;
  border-radius:12px;
  font-weight:bold;
  display:none;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
  z-index:100;
}
.toast button {
  background:white;
  color:#0aa2e6;
  border:none;
  padding:5px 10px;
  margin-left:10px;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}
.toast button:hover { background:#eee; }

</style>
</head>
<body>

<div class="modal">
  <div class="toast" id="rideToast">
    🚕 Waiting for driver to accept...
  </div>

  <h2>🛺 Choose Your Auto</h2>
  <div class="route" id="routeInfo">📍 Pickup → Drop (Distance: 13.42 KM)</div>
  <div class="fare-rate">Fare Rate: ₹25 / KM</div>

  <div class="autos" id="autoList"></div>
</div>

<script>
// ===== Sample Data =====
const autos = [
  { name:"Mini Auto", price:335.5, eta:"5–7 min", img:"images/riksha2.jpg" },
  { name:"Standard Auto", price:345.5, eta:"4–6 min", img:"images/riksha2.jpg" },
  { name:"Comfort Auto", price:355.5, eta:"3–5 min", img:"images/riksha2.jpg" },
  { name:"Electric Auto", price:350.5, eta:"4–6 min", img:"images/riksha2.jpg" }
];

const autoList = document.getElementById("autoList");
let selectedCard = null;
const toast = document.getElementById("rideToast");

// ===== Render Auto Cards =====
autos.forEach((auto)=>{
  const card = document.createElement("div");
  card.className="auto-card";
  card.innerHTML = `
    <img src="${auto.img}">
    <h4>${auto.name}</h4>
    <div class="price">₹${auto.price}</div>
    <div class="eta">⏱ ETA: ${auto.eta}</div>
    <button class="select-btn">Select</button>
  `;
  card.querySelector("button").onclick = ()=>{
    if(selectedCard) selectedCard.classList.remove("selected");
    card.classList.add("selected");
    selectedCard = card;

    // Show toast that ride is requested
    toast.innerHTML = "🚕 Waiting for driver to accept...";
    toast.style.display = "block";

    // Simulate saving ride (localStorage)
    const ride = {
      id: Date.now(),
      auto: auto.name,
      price: auto.price,
      status: "requested"
    };
    localStorage.setItem("currentRide", JSON.stringify(ride));

    // Simulate driver accepting after some time (for demo)
    setTimeout(() => showDriverAccepted(ride), 8000);
  };
  autoList.appendChild(card);
});

// ===== Show Driver Accepted =====
function showDriverAccepted(ride){
  toast.innerHTML = `✅ Driver Accepted! <button id="goToOtp">Go to OTP</button>`;
  document.getElementById("goToOtp").onclick = ()=>{
    window.location.href="otp.html";
  };
}
</script>

</body>
</html>
