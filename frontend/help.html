<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Help | MoveMaster</title>
<style>
  body {
    font-family: 'Baloo 2', cursive;
    margin: 0;
    padding: 0;
    background: linear-gradient(135deg, #0aa2e6, #42d1f5);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .help-card {
    background: #fff;
    padding: 30px 25px;
    border-radius: 20px;
    width: 350px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    text-align: center;
  }

  h2 {
    color: #0aa2e6;
    margin-bottom: 15px;
  }

  p {
    font-size: 15px;
    color: #333;
    line-height: 1.4;
    margin-bottom: 15px;
  }

  ul {
    text-align: left;
    margin: 10px 0 15px 20px;
    color: #555;
    font-size: 14px;
  }

  li {
    margin-bottom: 6px;
  }

  .contact {
    font-weight: bold;
    color: #007acc;
    margin-bottom: 20px;
    font-size: 15px;
  }

  a.button {
    display: inline-block;
    padding: 10px 20px;
    background: #0aa2e6;
    color: #fff;
    border-radius: 10px;
    text-decoration: none;
    margin-top: 10px;
    transition: 0.3s;
  }

  a.button:hover {
    background: #088ac7;
  }
</style>
</head>
<body>

<div class="help-card">
  <h2>🆘 Need Help?</h2>
  <p>Facing ride issues? Here’s how we can help:</p>
  <ul>
    <li>Delayed auto arrival</li>
    <li>Fare discrepancies</li>
    <li>Lost items in auto</li>
    <li>General ride support</li>
  </ul>
  <p class="contact">Call us: 📞 +91-2308054327</p>
  <a class="button" href="booking.html">← Back to Home</a>
</div>

</body>
</html>
