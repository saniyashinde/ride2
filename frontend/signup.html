<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MoveMaster | Signup/Login</title>

<!-- Google Identity Script -->
<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>
body {
  margin:0;
  font-family:'Baloo 2', cursive;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:linear-gradient(135deg,#0aa2e6,#42d1f5);
}

.box {
  background:#fff;
  padding:30px;
  border-radius:15px;
  width:350px;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h2 { color:#0aa2e6; margin-bottom:20px; }

input {
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:6px;
  border:1px solid #ccc;
}

button {
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:8px;
  font-size:16px;
  cursor:pointer;
}

.create-btn { background:#0aa2e6; color:#fff; }
.continue-btn { background:#42d1f5; color:#fff; }

.msg { font-size:14px; min-height:18px; margin-top:5px; }
.error { color:red; }
.valid { color:green; }
</style>
</head>

<body>

<div class="box">
  <h2>MoveMaster</h2>

  <button class="create-btn" onclick="showCreate()">➕ Create New Account</button>
  <button class="continue-btn" onclick="showContinue()">🔓 Already Have Account</button>

  <!-- ✅ GOOGLE LOGIN -->
  <div id="g_id_onload"
       data-client_id="943781661668-44q4u48pes40ma73g6vh8h27jpbg9jtk.apps.googleusercontent.com"
       data-callback="onGoogleLoginSuccess">
  </div>

  <div class="g_id_signin"></div>

  <div id="formArea" style="margin-top:20px;"></div>
  <p id="msg" class="msg"></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/jwt-decode@3.1.2/build/jwt-decode.min.js"></script>
<!-- ====================== MODIFIED PARTS ONLY ====================== -->
<script>
const formArea = document.getElementById("formArea");
const msg = document.getElementById("msg");

// Detect backend URL (local or deployed)
const API_URL = location.hostname === "localhost"
  ? "http://localhost:5000/api/users"
  : "http://localhost:5000/api/users";

/* ---------- CREATE ACCOUNT ---------- */
function showCreate() {
  msg.innerText = "";

  // Clear previous form
  formArea.innerHTML = "";

  // Name input
  const nameInput = document.createElement("input");
  nameInput.id = "name";
  nameInput.placeholder = "Full Name";

  // Email input
  const emailInput = document.createElement("input");
  emailInput.id = "email";
  emailInput.placeholder = "Gmail address";

  // Password input
  const passwordInput = document.createElement("input");
  passwordInput.id = "password";
  passwordInput.type = "password";
  passwordInput.placeholder = "Password";

  // Create account button
  const btn = document.createElement("button");
  btn.innerText = "Create Account";
  btn.addEventListener("click", createAccount);

  // Append all elements
  formArea.appendChild(nameInput);
  formArea.appendChild(emailInput);
  formArea.appendChild(passwordInput);
  formArea.appendChild(btn);
}

function showContinue() {
  msg.innerText = "";
  formArea.innerHTML = "";

  const emailInput = document.createElement("input");
  emailInput.id = "email";
  emailInput.placeholder = "Enter your email";

  const passwordInput = document.createElement("input");
  passwordInput.id = "password";
  passwordInput.type = "password";
  passwordInput.placeholder = "Password";

  const btn = document.createElement("button");
  btn.innerText = "Continue";
  btn.addEventListener("click", continueLogin);

  formArea.appendChild(emailInput);
  formArea.appendChild(passwordInput);
  formArea.appendChild(btn);
}
/* ---------- CREATE ACCOUNT ---------- */
async function createAccount(e) {
  if (e) e.preventDefault();
  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!name || !email || !password) {
    msg.innerText = "❌ All fields are required";
    msg.className = "msg error";
    return;
  }

  try {
    const res = await fetch(`${API_URL}/signup`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      credentials: "include",
      body: JSON.stringify({ name, email, password })
    });

    const data = await res.json();

    if (res.ok) {
      localStorage.setItem("userId", data.user._id);
      localStorage.setItem("loggedInEmail", data.user.email);
      localStorage.setItem("userEmail", data.user.email);
      localStorage.setItem("loggedIn", "true");
      msg.innerText = "✅ Account created successfully!";
      msg.className = "msg valid";
      setTimeout(() => window.location.href = "booking.html", 1000);
    } else {
      msg.innerText = `❌ ${data.msg || "Error creating account"}`;
      msg.className = "msg error";
    }
  } catch (err) {
    console.error("Signup Fetch error:", err);
    msg.innerText = "❌ Network error (Server offline or CORS)";
    msg.className = "msg error";
  }
}

/* ---------- NORMAL LOGIN ---------- */
async function continueLogin(e) {
  if (e) e.preventDefault();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!email || !password) {
    msg.innerText = "❌ Enter email and password";
    msg.className = "msg error";
    return;
  }

  try {
    const res = await fetch(`${API_URL}/login`, { // USE API_URL
      method: "POST",
      headers: { "Content-Type": "application/json" },
      credentials: "include",
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (res.ok) {
      localStorage.setItem("userId", data.user._id);
      localStorage.setItem("loggedInEmail", data.user.email);
      localStorage.setItem("userEmail", data.user.email);
      localStorage.setItem("loggedIn", "true");
      msg.innerText = "✅ Login successful!";
      msg.className = "msg valid";
      setTimeout(() => window.location.href = "booking.html", 1000);
    } else {
      msg.innerText = `❌ ${data.msg}`;
      msg.className = "msg error";
    }
  } catch (err) {
    console.error("Login Fetch error:", err);
    msg.innerText = "❌ Network error (Server offline or CORS)";
    msg.className = "msg error";
  }
}

/* ---------- GOOGLE LOGIN ---------- */
function onGoogleLoginSuccess(response) {
  const data = jwt_decode(response.credential);

  const userData = {
    name: data.name,
    email: data.email,
    image: data.picture
  };

  localStorage.setItem("loggedInUser", JSON.stringify(userData));
  localStorage.setItem("loggedInEmail", data.email);

  // Send Google user to backend
  fetch(`${API_URL}/signup`, { // USE API_URL
    method: "POST",
    headers: { "Content-Type": "application/json" },
    credentials: "include",
    body: JSON.stringify({ email: data.email, password: "google_oauth", name: data.name, image: data.picture })
  }).catch(err => console.log("Google user already exists or error"));

  window.location.href = "booking.html";
}
</script>

</body>
</html>
