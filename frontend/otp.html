<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mobile Number Verification | MoveMaster</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700&display=swap');

* { box-sizing:border-box; margin:0; padding:0; font-family:'Baloo 2', cursive; }

body {
  background: #eef6fb;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding-top: 75px;
}

/* ===== NAVBAR ===== */
.navbar {
  position:fixed; top:0; left:0; width:100%; height:62px;
  background:#fff;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 28px;
  box-shadow:0 3px 18px rgba(0,0,0,0.10);
  z-index:999;
}
.nav-left { font-size:20px; font-weight:700; color:#0aa2e6; display:flex; align-items:center; gap:8px; }
.nav-center { display:flex; gap:22px; }
.nav-center a {
  text-decoration:none; color:#555; font-size:14.5px;
  display:flex; align-items:center; gap:5px;
  border-bottom:2px solid transparent;
  transition:color 0.2s, border-color 0.2s;
}
.nav-center a:hover { color:#0aa2e6; border-bottom-color:#0aa2e6; }
.profile { position:relative; }
.profile-btn {
  cursor:pointer; background:#0aa2e6; color:#fff;
  padding:7px 14px; border-radius:20px;
  display:flex; align-items:center; gap:6px;
  font-size:14px; font-weight:600;
}
.dropdown {
  position:absolute; right:0; top:52px;
  background:#fff; width:168px; border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.15);
  display:none; overflow:hidden; z-index:1000;
}
.dropdown a { display:block; padding:12px 16px; text-decoration:none; color:#444; font-size:14px; }
.dropdown a:hover { background:#f0f8ff; color:#0aa2e6; }

/* ===== CARD ===== */
.card {
  background:#fff;
  padding:36px 32px;
  width:400px;
  border-radius:22px;
  box-shadow:0 12px 40px rgba(10,162,230,0.13);
  text-align:center;
  animation:slideUp 0.45s ease;
}
@keyframes slideUp {
  from { opacity:0; transform:translateY(22px); }
  to   { opacity:1; transform:translateY(0); }
}
.card-icon { font-size:44px; display:block; margin-bottom:8px; animation:bounce 2s infinite; }
@keyframes bounce {
  0%,100% { transform:translateY(0); }
  50%      { transform:translateY(-7px); }
}
.card h3 { font-size:20px; font-weight:700; color:#2c3e50; margin-bottom:22px; }

/* ===== MOBILE INPUT ===== */
.input-row { display:flex; gap:8px; margin-bottom:14px; }
select {
  padding:11px 10px;
  border:2px solid #dce8f0; border-radius:10px;
  font-size:14px; font-family:'Baloo 2', cursive;
  background:#f8fcff; color:#2c3e50;
  cursor:pointer; flex-shrink:0;
}
select:focus { outline:none; border-color:#0aa2e6; }
.input-row input {
  flex:1; padding:11px 14px; font-size:16px;
  border:2px solid #dce8f0; border-radius:10px;
  font-family:'Baloo 2', cursive; color:#2c3e50; background:#f8fcff;
  transition:border 0.2s;
}
.input-row input:focus { outline:none; border-color:#0aa2e6; }

/* ===== SEND BTN ===== */
#sendBtn {
  width:100%; padding:13px;
  background:#0aa2e6; color:#fff;
  border:none; border-radius:11px;
  font-size:16px; font-weight:700;
  font-family:'Baloo 2', cursive;
  cursor:pointer;
  transition:background 0.2s, transform 0.15s;
}
#sendBtn:hover { background:#088ac7; transform:translateY(-1px); }
#sendBtn:disabled { background:#a6d4ff; cursor:not-allowed; transform:none; }

/* ===== STATUS MSG ===== */
/* ✅ ID is "statusMsg" — matches otp.js exactly */
#statusMsg {
  font-size:14px; font-weight:600;
  margin-top:12px; min-height:22px;
  animation:pulse 1.2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }

/* ===== OTP RESULT ===== */
#otpResult {
  display:none;
  margin-top:22px;
  animation:fadeIn 0.4s ease;
}
@keyframes fadeIn {
  from { opacity:0; transform:translateY(10px); }
  to   { opacity:1; transform:translateY(0); }
}
.otp-label { font-size:13px; color:#888; margin-bottom:8px; }
.otp-number-box {
  background: linear-gradient(135deg, #fffbe6, #fff3cd);
  border: 2.5px dashed #ffc107;
  border-radius:16px;
  padding:22px 10px 14px;
  margin-bottom:16px;
}
.otp-digits {
  font-size:54px; font-weight:700;
  color:#ff8c00; letter-spacing:16px;
  display:block;
  animation:popIn 0.5s ease;
}
@keyframes popIn {
  0%   { transform:scale(0.5); opacity:0; }
  70%  { transform:scale(1.1); }
  100% { transform:scale(1); opacity:1; }
}
.otp-note { font-size:12px; color:#aaa; margin-top:6px; }

/* ===== BUTTONS ===== */
.btn-copy {
  width:100%; padding:12px;
  background:#fff; color:#0aa2e6;
  border:2px solid #0aa2e6; border-radius:11px;
  font-size:15px; font-weight:700;
  font-family:'Baloo 2', cursive;
  cursor:pointer; margin-bottom:10px;
  transition:all 0.2s;
}
.btn-copy:hover { background:#e8f7ff; }
.btn-copy.copied { background:#22cc88; color:#fff; border-color:#22cc88; }

.btn-next {
  width:100%; padding:13px;
  background:#22cc88; color:#fff;
  border:none; border-radius:11px;
  font-size:16px; font-weight:700;
  font-family:'Baloo 2', cursive;
  cursor:pointer;
  transition:background 0.2s, transform 0.15s;
  box-shadow:0 4px 14px rgba(34,204,136,0.25);
}
.btn-next:hover { background:#1aaa70; transform:translateY(-1px); }
</style>
</head>
<body>

<!-- ===== NAVBAR ===== -->
<div class="navbar">
  <div class="nav-left">🛺 MoveMaster</div>
  <div class="nav-center">
    <a href="home.html">🏠 Home</a>
    <a href="services.html">🛺 Services</a>
    <a href="activity.html">📊 Activity</a>
    <a href="help.html">🆘 Help</a>
  </div>
  <div class="profile">
    <div class="profile-btn" onclick="toggleMenu()">👤 ⌄</div>
    <div class="dropdown" id="menu">
      <a href="profile.html">👤 My Profile</a>
      <a href="ridehistory.html">📜 Ride History</a>
      <a href="#" onclick="logout()">🚪 Logout</a>
    </div>
  </div>
</div>

<!-- ===== CARD ===== -->
<div class="card">
  <span class="card-icon">🛺</span>
  <h3>Mobile Number Verification</h3>

  <!-- Mobile Input -->
  <div class="input-row">
    <select id="countryCode">
      <option value="+91">🇮🇳 IN +91</option>
    </select>
    <!-- ✅ type="text", no oninput restriction so user can type freely -->
    <input type="text" id="mobile" placeholder="Enter 10-digit number" maxlength="10" />
  </div>

  <button id="sendBtn" onclick="sendOTP()">📩 Send OTP</button>

  <!-- ✅ ID is "statusMsg" — matches otp.js -->
  <p id="statusMsg"></p>

  <!-- OTP Result — shown after countdown -->
  <div id="otpResult">
    <div class="otp-label">Your OTP — Share with your driver 🛺</div>
    <div class="otp-number-box">
      <span class="otp-digits" id="otpDigits">----</span>
      <div class="otp-note">Tell this OTP to your driver to start the ride</div>
    </div>
    <button class="btn-copy" id="copyBtn" onclick="copyOTP()">📋 Copy OTP</button>
    <button class="btn-next" onclick="goNext()">Confirm Ride ➜</button>
  </div>
</div>

<!-- ✅ otp.js loaded from same folder -->
<script src="otp.js"></script>
function goNext() {
  window.location.href = "confirm.html";
}
</body>
</html>
